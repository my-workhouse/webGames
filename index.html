<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>太空球游戏</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="game-container">
        <!-- 游戏画布 -->
        <canvas id="gameCanvas" width="800" height="600"></canvas>
        
        <!-- 游戏状态显示 -->
        <div class="game-status">
            <div class="score">分数: <span id="score">0</span></div>
            <div class="status" id="status">等待开始</div>
        </div>
        
        <!-- 游戏控制按钮 -->
        <div class="game-controls">
            <button id="startBtn" class="control-btn">开始游戏</button>
            <button id="pauseBtn" class="control-btn" disabled>暂停游戏</button>
            <button id="restartBtn" class="control-btn" disabled>重新开始</button>
        </div>
        
        <!-- 游戏开始界面 -->
        <div class="game-overlay" id="startOverlay">
            <div class="overlay-content">
                <h1>太空球</h1>
                <p>使用鼠标控制太空球移动</p>
                <p>收集星星获得分数</p>
                <p>避免碰撞到边缘和自己的轨迹</p>
                <h3>游戏规则：</h3>
                <ul>
                    <li>小星星：分数高</li>
                    <li>大星星：分数低</li>
                    <li>碰撞到屏幕边缘游戏结束</li>
                    <li>碰撞到自己的轨迹游戏结束</li>
                    <li>收集星星后太空球会加速</li>
                    <li>轨迹会随着时间逐渐消失</li>
                </ul>
                <button id="startGameBtn" class="overlay-btn">开始游戏</button>
            </div>
        </div>
        
        <!-- 游戏暂停界面 -->
        <div class="game-overlay" id="pauseOverlay" style="display: none;">
            <div class="overlay-content">
                <h2>游戏暂停</h2>
                <button id="resumeBtn" class="overlay-btn">继续游戏</button>
                <button id="restartGameBtn" class="overlay-btn">重新开始</button>
            </div>
        </div>
        
        <!-- 游戏结束界面 -->
        <div class="game-overlay" id="gameOverOverlay" style="display: none;">
            <div class="overlay-content">
                <h2>游戏结束</h2>
                <p>最终分数: <span id="finalScore">0</span></p>
                <button id="playAgainBtn" class="overlay-btn">再来一局</button>
            </div>
        </div>
    </div>
    
    <script src="js/game.js"></script>
</body>
</html>
